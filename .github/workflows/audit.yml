name: Audit qualité des articles

on:
  push:
    paths:
      - 'frontkick/src/content/articles/**'
  pull_request:
    paths:
      - 'frontkick/src/content/articles/**'
  workflow_dispatch:

jobs:
  audit:
    name: Vérification qualité des articles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit des articles
        working-directory: frontkick
        run: |
          node scripts/audit-articles.mjs
          echo ""
          echo "📄 Rapport complet :"
          cat scripts/audit-report.md

      - name: Vérifier les erreurs bloquantes
        working-directory: frontkick
        run: |
          ERRORS=$(node -e "
            const fs = require('fs');
            const report = fs.readFileSync('scripts/audit-report.md', 'utf8');
            const match = report.match(/\| ❌ ERREUR \| (\d+)/);
            console.log(match ? match[1] : '0');
          ")
          echo "Articles en erreur : $ERRORS"
          if [ "$ERRORS" -gt "0" ]; then
            echo "❌ Des articles ont des erreurs bloquantes. Voir le rapport ci-dessus."
            exit 1
          fi
          echo "✅ Tous les articles passent l'audit."

      - name: Upload rapport d'audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: frontkick/scripts/audit-report.md
          retention-days: 30
