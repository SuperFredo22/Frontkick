name: Génération automatique d'articles

on:
  # Tous les jours à 8h UTC (10h Paris)
  schedule:
    - cron: '0 8 * * *'
  # Possibilité de déclencher manuellement depuis l'onglet Actions
  workflow_dispatch:
    inputs:
      sport:
        description: 'Sport ciblé (laisser vide pour rotation auto)'
        required: false
        default: ''

jobs:
  generate:
    name: Générer un article FightFocus
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontkick/package-lock.json

      - name: Installer les dépendances
        working-directory: frontkick
        run: npm ci

      - name: Générer l'article
        working-directory: frontkick
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          FORCE_SPORT: ${{ github.event.inputs.sport }}
        run: node scripts/generate-article.mjs

      - name: Vérifier les nouveaux fichiers
        id: check
        run: |
          NEW=$(git -C frontkick status --porcelain src/content/articles/ | grep '^??' | wc -l)
          echo "new_articles=$NEW" >> $GITHUB_OUTPUT
          echo "Nouveaux articles détectés : $NEW"

      - name: Commit et push
        if: steps.check.outputs.new_articles > 0
        run: |
          git config user.name  "FightFocus Bot"
          git config user.email "bot@fightfocus.fr"
          git add frontkick/src/content/articles/
          git commit -m "feat(auto): article généré — $(date -u '+%Y-%m-%d')"
          git push origin main

      - name: Résumé
        run: |
          if [ "${{ steps.check.outputs.new_articles }}" -gt "0" ]; then
            echo "✅ Article généré et publié. Vercel déploie automatiquement."
          else
            echo "ℹ️ Aucun nouvel article créé (doublon ou erreur)."
          fi
