name: FightFocus — Génération automatique d'articles

on:
  schedule:
    # Tous les jours à 8h00 UTC (9h hiver FR / 10h été FR)
    - cron: '0 8 * * *'
  # Déclenchement manuel : GitHub → Actions → "Run workflow"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-article:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Récupérer le repo ──────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Node.js ───────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Génération de l'article ───────────────────────────────────────
      #    Le script v4 gère lui-même :
      #      · l'évaluation de la qualité des actus (score Perplexity)
      #      · le pivot automatique si la semaine est calme
      #      · le retry Gemini en cas de timeout
      - name: Générer l'article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: node frontkick/scripts/generate-article.mjs

      # ── 4. Commit et push ────────────────────────────────────────────────
      - name: Commit et push
        run: |
          git config user.name "FightFocus Bot"
          git config user.email "contact@fightfocus.fr"
          git add frontkick/src/content/articles/
          if git diff --staged --quiet; then
            echo "ℹ️  Aucun article généré — rien à commiter."
          else
            ARTICLE_COUNT=$(git diff --staged --name-only | wc -l)
            git commit -m "feat(articles): article automatique $(date -u +'%Y-%m-%d %H:%M') UTC"
            git push
            echo "✅ Push réussi — ${ARTICLE_COUNT} fichier(s) ajouté(s)"
          fi
