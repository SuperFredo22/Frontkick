<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="gmuaythai" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Fond dégradé -->
  <rect width="1200" height="630" fill="url(#gmuaythai)"/>

  <!-- Motif géométrique discret -->
  <circle cx="950" cy="120" r="320" fill="white" fill-opacity="0.04"/>
  <circle cx="1050" cy="400" r="200" fill="white" fill-opacity="0.03"/>
  <circle cx="200" cy="520" r="150" fill="white" fill-opacity="0.025"/>

  <!-- Bande accent gauche -->
  <rect x="0" y="0" width="8" height="630" fill="#FDE68A" opacity="0.8"/>

  <!-- Logo FightFocus -->
  <rect x="60" y="52" width="48" height="48" rx="10" fill="#FDE68A" opacity="0.9"/>
  <text x="84" y="83" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#78350f" text-anchor="middle">FF</text>
  <text x="124" y="82" font-family="Arial Black, sans-serif" font-size="24" font-weight="900" fill="white" letter-spacing="1">Fight<tspan fill="#FDE68A">Focus</tspan></text>

  <!-- Icône sport (grand) -->
  <text x="950" y="380" font-size="220" text-anchor="middle" opacity="0.15">🦵</text>

  <!-- Titre sport -->
  <text x="60" y="300" font-family="Arial Black, Impact, sans-serif" font-size="96" font-weight="900" fill="white" letter-spacing="-1" opacity="0.97">Muay Thaï</text>

  <!-- Sous-titre -->
  <text x="60" y="360" font-family="Arial, sans-serif" font-size="32" fill="#FDE68A" opacity="0.85">L'Art des 8 Membres</text>

  <!-- Tagline -->
  <text x="60" y="540" font-family="Arial, sans-serif" font-size="22" fill="white" opacity="0.55">fightfocus.fr · Guides, Analyses &amp; Techniques</text>

  <!-- Ligne décorative -->
  <rect x="60" y="395" width="120" height="4" rx="2" fill="#FDE68A" opacity="0.6"/>
</svg>