<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0908"/>
      <stop offset="55%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#44403c"/>
    </linearGradient>
    <radialGradient id="vign" cx="28%" cy="50%" r="90%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.76)"/>
    </radialGradient>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" seed="9" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="multiply" result="b"/>
      <feComposite in="b" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="rgba(160,160,160,0.14)" filter="url(#grain)"/>

  <!-- Bandage wrapping diagonals - denser pattern -->
  <line x1="430" y1="0"   x2="800" y2="370" stroke="rgba(255,255,255,0.055)" stroke-width="16"/>
  <line x1="365" y1="0"   x2="800" y2="435" stroke="rgba(255,255,255,0.045)" stroke-width="12"/>
  <line x1="495" y1="0"   x2="800" y2="305" stroke="rgba(255,255,255,0.045)" stroke-width="12"/>
  <line x1="560" y1="0"   x2="800" y2="240" stroke="rgba(255,255,255,0.035)" stroke-width="9"/>
  <line x1="625" y1="0"   x2="800" y2="175" stroke="rgba(255,255,255,0.030)" stroke-width="7"/>
  <line x1="430" y1="450" x2="800" y2="80"  stroke="rgba(255,255,255,0.030)" stroke-width="9"/>
  <line x1="365" y1="450" x2="800" y2="15"  stroke="rgba(255,255,255,0.025)" stroke-width="7"/>

  <!-- Bare-knuckle cross symbol -->
  <circle cx="660" cy="228" r="100" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="5"/>
  <circle cx="660" cy="228" r="70"  fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="3"/>
  <line x1="660" y1="128" x2="660" y2="328" stroke="rgba(255,255,255,0.12)" stroke-width="4.5"/>
  <line x1="560" y1="228" x2="760" y2="228" stroke="rgba(255,255,255,0.12)" stroke-width="4.5"/>
  <!-- Diagonal cross arms -->
  <line x1="590" y1="158" x2="730" y2="298" stroke="rgba(255,255,255,0.06)" stroke-width="2.5"/>
  <line x1="730" y1="158" x2="590" y2="298" stroke="rgba(255,255,255,0.06)" stroke-width="2.5"/>

  <line x1="0" y1="350" x2="330" y2="0" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>

  <rect x="62" y="148" width="50" height="2" fill="rgba(120,113,108,0.65)"/>

  <!-- Text shadow -->
  <text x="66" y="224" font-family="'Arial Black',Impact,sans-serif" font-size="108" font-weight="900" fill="rgba(0,0,0,0.50)">LETH</text>
  <text x="66" y="318" font-family="'Arial Black',Impact,sans-serif" font-size="108" font-weight="900" fill="rgba(0,0,0,0.50)">WEI</text>
  <!-- Main text -->
  <text x="62" y="220" font-family="'Arial Black',Impact,sans-serif" font-size="108" font-weight="900" fill="white" opacity="0.96">LETH</text>
  <text x="62" y="314" font-family="'Arial Black',Impact,sans-serif" font-size="108" font-weight="900" fill="white" opacity="0.96">WEI</text>

  <text x="66" y="348" font-family="Arial,sans-serif" font-size="16" fill="rgba(255,255,255,0.46)" letter-spacing="8">BOXE BIRMANE · POINGS NUS</text>
  <rect x="66" y="364" width="55" height="3" rx="1.5" fill="#78716c"/>
  <rect x="127" y="364" width="120" height="3" rx="1.5" fill="rgba(255,255,255,0.12)"/>
  <text x="66" y="400" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.32)" letter-spacing="4">TÊTE · COUDES · MYANMAR</text>
  <text x="66" y="430" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.16)" letter-spacing="6">FIGHTFOCUS.FR</text>

  <rect width="800" height="450" fill="url(#vign)"/>
</svg>
