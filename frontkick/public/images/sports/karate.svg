<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080808"/>
      <stop offset="55%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#3D3D3D"/>
    </linearGradient>
    <radialGradient id="vign" cx="28%" cy="50%" r="90%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.75)"/>
    </radialGradient>
    <radialGradient id="sunglow" cx="72%" cy="50%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" seed="15" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="multiply" result="b"/>
      <feComposite in="b" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="rgba(160,160,160,0.13)" filter="url(#grain)"/>
  <rect width="800" height="450" fill="url(#sunglow)"/>

  <!-- Rising sun - large concentric circles -->
  <circle cx="660" cy="225" r="140" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="36"/>
  <circle cx="660" cy="225" r="95" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="20"/>
  <circle cx="660" cy="225" r="55" fill="rgba(255,255,255,0.04)"/>
  <!-- Sun rays (8 directions) -->
  <line x1="660" y1="65"  x2="660" y2="30"  stroke="rgba(255,255,255,0.10)" stroke-width="4.5"/>
  <line x1="759" y1="126" x2="786" y2="99"  stroke="rgba(255,255,255,0.10)" stroke-width="4.5"/>
  <line x1="820" y1="225" x2="856" y2="225" stroke="rgba(255,255,255,0.10)" stroke-width="4.5"/>
  <line x1="759" y1="324" x2="786" y2="351" stroke="rgba(255,255,255,0.10)" stroke-width="4.5"/>
  <line x1="660" y1="385" x2="660" y2="420" stroke="rgba(255,255,255,0.10)" stroke-width="4.5"/>
  <line x1="561" y1="324" x2="534" y2="351" stroke="rgba(255,255,255,0.10)" stroke-width="4.5"/>
  <line x1="500" y1="225" x2="464" y2="225" stroke="rgba(255,255,255,0.10)" stroke-width="4.5"/>
  <line x1="561" y1="126" x2="534" y2="99"  stroke="rgba(255,255,255,0.10)" stroke-width="4.5"/>

  <!-- Kanji-style strokes (abstract) -->
  <rect x="635" y="178" width="11" height="94" rx="5.5" fill="rgba(255,255,255,0.16)"/>
  <rect x="656" y="178" width="11" height="94" rx="5.5" fill="rgba(255,255,255,0.16)"/>
  <rect x="626" y="225" width="60" height="9"  rx="4.5" fill="rgba(255,255,255,0.16)"/>

  <!-- Diagonal lines -->
  <line x1="0" y1="360" x2="340" y2="0" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>
  <line x1="0" y1="280" x2="260" y2="0" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <rect x="62" y="148" width="50" height="2" fill="rgba(160,160,160,0.55)"/>

  <!-- Text shadow -->
  <text x="66" y="226" font-family="'Arial Black',Impact,sans-serif" font-size="112" font-weight="900" fill="rgba(0,0,0,0.50)">KARA</text>
  <text x="66" y="322" font-family="'Arial Black',Impact,sans-serif" font-size="112" font-weight="900" fill="rgba(0,0,0,0.50)">TE</text>
  <!-- Main text -->
  <text x="62" y="222" font-family="'Arial Black',Impact,sans-serif" font-size="112" font-weight="900" fill="white" opacity="0.96">KARA</text>
  <text x="62" y="318" font-family="'Arial Black',Impact,sans-serif" font-size="112" font-weight="900" fill="white" opacity="0.96">TE</text>

  <text x="66" y="350" font-family="Arial,sans-serif" font-size="16" fill="rgba(255,255,255,0.46)" letter-spacing="9">VOIE DE LA MAIN VIDE</text>
  <rect x="66" y="366" width="55" height="3" rx="1.5" fill="#6B7280"/>
  <rect x="127" y="366" width="120" height="3" rx="1.5" fill="rgba(255,255,255,0.12)"/>
  <text x="66" y="400" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.32)" letter-spacing="4">KATA · KUMITE · JAPON</text>
  <text x="66" y="430" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.16)" letter-spacing="6">FIGHTFOCUS.FR</text>

  <rect width="800" height="450" fill="url(#vign)"/>
</svg>
