<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3A0E00"/>
      <stop offset="55%" stop-color="#7c2d12"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </linearGradient>
    <radialGradient id="vign" cx="28%" cy="50%" r="90%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.72)"/>
    </radialGradient>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" seed="14" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="multiply" result="b"/>
      <feComposite in="b" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="rgba(160,160,160,0.13)" filter="url(#grain)"/>

  <!-- Dragon scale pattern - 3 rows denser -->
  <ellipse cx="510" cy="92" rx="38" ry="20" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <ellipse cx="570" cy="92" rx="38" ry="20" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <ellipse cx="630" cy="92" rx="38" ry="20" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <ellipse cx="690" cy="92" rx="38" ry="20" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <ellipse cx="750" cy="92" rx="38" ry="20" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>
  <ellipse cx="540" cy="130" rx="38" ry="20" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>
  <ellipse cx="600" cy="130" rx="38" ry="20" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>
  <ellipse cx="660" cy="130" rx="38" ry="20" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>
  <ellipse cx="720" cy="130" rx="38" ry="20" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>
  <ellipse cx="780" cy="130" rx="38" ry="20" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <ellipse cx="510" cy="168" rx="38" ry="20" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <ellipse cx="570" cy="168" rx="38" ry="20" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <ellipse cx="630" cy="168" rx="38" ry="20" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <ellipse cx="690" cy="168" rx="38" ry="20" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <ellipse cx="750" cy="168" rx="38" ry="20" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>

  <!-- Diagonal lines -->
  <line x1="0" y1="360" x2="340" y2="0" stroke="rgba(234,88,12,0.18)" stroke-width="1.5"/>
  <line x1="0" y1="270" x2="250" y2="0" stroke="rgba(234,88,12,0.10)" stroke-width="1"/>

  <rect x="62" y="148" width="50" height="2" fill="rgba(251,146,60,0.60)"/>

  <!-- Text shadow -->
  <text x="66" y="232" font-family="'Arial Black',Impact,sans-serif" font-size="134" font-weight="900" fill="rgba(0,0,0,0.48)" letter-spacing="-2">SANDA</text>
  <!-- Main text -->
  <text x="62" y="228" font-family="'Arial Black',Impact,sans-serif" font-size="134" font-weight="900" fill="white" opacity="0.97" letter-spacing="-2">SANDA</text>

  <text x="66" y="272" font-family="Arial,sans-serif" font-size="17" fill="rgba(255,255,255,0.50)" letter-spacing="9">散打 · WUSHU DE COMBAT</text>
  <rect x="66" y="290" width="55" height="3" rx="1.5" fill="#ea580c"/>
  <rect x="127" y="290" width="100" height="3" rx="1.5" fill="rgba(255,255,255,0.12)"/>
  <text x="66" y="328" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.34)" letter-spacing="4">PIEDS-POINGS · PROJECTIONS · CHINE</text>
  <text x="66" y="422" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.18)" letter-spacing="6">FIGHTFOCUS.FR</text>

  <rect width="800" height="450" fill="url(#vign)"/>
</svg>
