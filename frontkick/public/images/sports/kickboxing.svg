<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#022C20"/>
      <stop offset="55%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <radialGradient id="vign" cx="28%" cy="50%" r="90%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.70)"/>
    </radialGradient>
    <radialGradient id="burst" cx="72%" cy="30%" r="22%">
      <stop offset="0%" stop-color="rgba(16,185,129,0.4)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" seed="3" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="multiply" result="b"/>
      <feComposite in="b" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="rgba(160,160,160,0.13)" filter="url(#grain)"/>
  <rect width="800" height="450" fill="url(#burst)"/>

  <!-- Dynamic kick arc - thick motion trail -->
  <path d="M510,420 Q600,300 690,190 Q730,140 775,105" fill="none" stroke="rgba(16,185,129,0.28)" stroke-width="65" stroke-linecap="round"/>
  <path d="M510,420 Q600,300 690,190 Q730,140 775,105" fill="none" stroke="rgba(16,185,129,0.14)" stroke-width="110" stroke-linecap="round"/>
  <path d="M510,420 Q600,300 690,190 Q730,140 775,105" fill="none" stroke="rgba(56,200,150,0.18)" stroke-width="18" stroke-linecap="round"/>

  <!-- Impact burst circles -->
  <circle cx="700" cy="148" r="60" fill="none" stroke="rgba(16,185,129,0.38)" stroke-width="3"/>
  <circle cx="700" cy="148" r="40" fill="none" stroke="rgba(16,185,129,0.22)" stroke-width="2"/>
  <circle cx="700" cy="148" r="22" fill="rgba(16,185,129,0.18)"/>
  <!-- Impact star lines -->
  <line x1="700" y1="88"  x2="700" y2="72"  stroke="rgba(16,185,129,0.45)" stroke-width="2.5"/>
  <line x1="742" y1="112" x2="754" y2="100" stroke="rgba(16,185,129,0.35)" stroke-width="2.5"/>
  <line x1="760" y1="148" x2="778" y2="148" stroke="rgba(16,185,129,0.35)" stroke-width="2.5"/>
  <line x1="742" y1="184" x2="754" y2="196" stroke="rgba(16,185,129,0.30)" stroke-width="2"/>
  <line x1="658" y1="112" x2="646" y2="100" stroke="rgba(16,185,129,0.30)" stroke-width="2"/>

  <!-- Speed lines -->
  <line x1="430" y1="195" x2="660" y2="90"  stroke="rgba(255,255,255,0.07)" stroke-width="2.5"/>
  <line x1="430" y1="232" x2="680" y2="135" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>
  <line x1="430" y1="268" x2="700" y2="180" stroke="rgba(255,255,255,0.04)" stroke-width="1.5"/>

  <line x1="0" y1="380" x2="360" y2="0" stroke="rgba(16,185,129,0.14)" stroke-width="1.5"/>

  <rect x="62" y="148" width="50" height="2" fill="rgba(52,211,153,0.55)"/>

  <!-- Text shadow -->
  <text x="66" y="198" font-family="'Arial Black',Impact,sans-serif" font-size="84" font-weight="900" fill="rgba(0,0,0,0.45)">KICK</text>
  <text x="66" y="284" font-family="'Arial Black',Impact,sans-serif" font-size="84" font-weight="900" fill="rgba(0,0,0,0.45)">BOXING</text>
  <!-- Main text -->
  <text x="62" y="194" font-family="'Arial Black',Impact,sans-serif" font-size="84" font-weight="900" fill="white" opacity="0.97">KICK</text>
  <text x="62" y="280" font-family="'Arial Black',Impact,sans-serif" font-size="84" font-weight="900" fill="white" opacity="0.97">BOXING</text>

  <text x="66" y="314" font-family="Arial,sans-serif" font-size="16" fill="rgba(255,255,255,0.50)" letter-spacing="9">FULL CONTACT · PIEDS-POINGS</text>
  <rect x="66" y="330" width="55" height="3" rx="1.5" fill="#10B981"/>
  <rect x="127" y="330" width="95" height="3" rx="1.5" fill="rgba(255,255,255,0.14)"/>
  <text x="66" y="368" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.35)" letter-spacing="4">FRAPPE · USA / JAPON</text>
  <text x="66" y="422" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.18)" letter-spacing="6">FIGHTFOCUS.FR</text>

  <rect width="800" height="450" fill="url(#vign)"/>
</svg>
