<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B0000"/>
      <stop offset="55%" stop-color="#7f1d1d"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <radialGradient id="vign" cx="28%" cy="50%" r="90%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.68)"/>
    </radialGradient>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" seed="8" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="multiply" result="b"/>
      <feComposite in="b" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="rgba(160,160,160,0.13)" filter="url(#grain)"/>

  <!-- Ring ropes - 4 horizontal ropes -->
  <line x1="420" y1="118" x2="790" y2="118" stroke="rgba(255,255,255,0.11)" stroke-width="9" stroke-linecap="round"/>
  <line x1="420" y1="182" x2="790" y2="182" stroke="rgba(255,255,255,0.09)" stroke-width="9" stroke-linecap="round"/>
  <line x1="420" y1="246" x2="790" y2="246" stroke="rgba(255,255,255,0.07)" stroke-width="9" stroke-linecap="round"/>
  <line x1="420" y1="310" x2="790" y2="310" stroke="rgba(255,255,255,0.06)" stroke-width="9" stroke-linecap="round"/>
  <!-- Corner post -->
  <rect x="768" y="90" width="16" height="250" rx="8" fill="rgba(255,255,255,0.10)"/>
  <rect x="420" y="90" width="14" height="250" rx="7" fill="rgba(255,255,255,0.08)"/>
  <!-- Turnbuckle connectors -->
  <rect x="426" y="113" width="350" height="10" rx="5" fill="rgba(220,38,38,0.22)"/>
  <rect x="426" y="177" width="350" height="10" rx="5" fill="rgba(220,38,38,0.15)"/>

  <!-- Gloves -->
  <circle cx="585" cy="228" r="65" fill="rgba(0,0,0,0.2)" stroke="rgba(255,255,255,0.18)" stroke-width="4"/>
  <circle cx="695" cy="228" r="65" fill="rgba(0,0,0,0.2)" stroke="rgba(255,255,255,0.18)" stroke-width="4"/>
  <rect x="554" y="265" width="32" height="48" rx="10" fill="rgba(255,255,255,0.10)"/>
  <rect x="693" y="265" width="32" height="48" rx="10" fill="rgba(255,255,255,0.10)"/>
  <!-- Impact point -->
  <circle cx="640" cy="228" r="14" fill="rgba(255,255,255,0.22)"/>
  <circle cx="640" cy="228" r="7" fill="rgba(255,255,255,0.3)"/>

  <!-- Diagonal lines -->
  <line x1="0" y1="390" x2="370" y2="0" stroke="rgba(220,38,38,0.2)" stroke-width="1.5"/>
  <line x1="40" y1="450" x2="410" y2="0" stroke="rgba(220,38,38,0.12)" stroke-width="1"/>

  <!-- Horizontal rule -->
  <rect x="62" y="148" width="50" height="2" fill="rgba(255,120,120,0.5)"/>

  <!-- Text shadow -->
  <text x="66" y="202" font-family="'Arial Black',Impact,sans-serif" font-size="122" font-weight="900" fill="rgba(0,0,0,0.45)" letter-spacing="-2">BOXE</text>
  <!-- Main text -->
  <text x="62" y="198" font-family="'Arial Black',Impact,sans-serif" font-size="122" font-weight="900" fill="white" opacity="0.97" letter-spacing="-2">BOXE</text>

  <text x="66" y="248" font-family="Arial,sans-serif" font-size="18" fill="rgba(255,255,255,0.52)" letter-spacing="11">BOXE ANGLAISE</text>
  <!-- Accent bars -->
  <rect x="66" y="266" width="50" height="3" rx="1.5" fill="#DC2626"/>
  <rect x="122" y="266" width="28" height="3" rx="1.5" fill="rgba(255,255,255,0.22)"/>
  <text x="66" y="308" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.35)" letter-spacing="5">RING · PUGILAT · GRANDE-BRETAGNE</text>
  <text x="66" y="422" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.18)" letter-spacing="6">FIGHTFOCUS.FR</text>

  <rect width="800" height="450" fill="url(#vign)"/>
</svg>
