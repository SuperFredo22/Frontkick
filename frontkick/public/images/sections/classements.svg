<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1200"/>
      <stop offset="100%" stop-color="#3d2e00"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Podium bars -->
  <rect x="530" y="240" width="80" height="140" rx="4" fill="rgba(192,192,192,0.25)" stroke="rgba(192,192,192,0.3)" stroke-width="2"/>
  <rect x="620" y="190" width="80" height="190" rx="4" fill="rgba(255,215,0,0.3)"  stroke="rgba(255,215,0,0.5)"   stroke-width="2"/>
  <rect x="710" y="270" width="80" height="110" rx="4" fill="rgba(205,127,50,0.25)" stroke="rgba(205,127,50,0.3)" stroke-width="2"/>
  <!-- Number labels -->
  <text x="562" y="235" font-family="'Arial Black',Impact,sans-serif" font-size="28" fill="rgba(192,192,192,0.7)" text-anchor="middle">2</text>
  <text x="660" y="185" font-family="'Arial Black',Impact,sans-serif" font-size="32" fill="rgba(255,215,0,0.9)" text-anchor="middle">1</text>
  <text x="750" y="265" font-family="'Arial Black',Impact,sans-serif" font-size="26" fill="rgba(205,127,50,0.7)" text-anchor="middle">3</text>
  <!-- Trophy crown on #1 -->
  <polygon points="660,148 648,165 672,165" fill="rgba(255,215,0,0.6)"/>
  <rect x="648" y="165" width="24" height="16" rx="2" fill="rgba(255,215,0,0.6)"/>
  <!-- Star row -->
  <text x="530" y="100" font-family="Arial,sans-serif" font-size="22" fill="rgba(255,215,0,0.5)">★ ★ ★ ★ ★</text>
  <!-- Left bar gold -->
  <rect x="0" y="0" width="4" height="450" fill="#FFD700"/>
  <!-- Section name -->
  <text x="62" y="185" font-family="'Arial Black',Impact,sans-serif" font-size="72" font-weight="900" fill="white" opacity="0.95">CLASS</text>
  <text x="62" y="265" font-family="'Arial Black',Impact,sans-serif" font-size="72" font-weight="900" fill="white" opacity="0.95">EMENTS</text>
  <text x="66" y="298" font-family="Arial,sans-serif" font-size="16" fill="rgba(255,255,255,0.5)" letter-spacing="7">UFC · RANKINGS · P4P</text>
  <rect x="66" y="316" width="140" height="4" rx="2" fill="#FFD700"/>
  <text x="66" y="420" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.22)" letter-spacing="5">FIGHTFOCUS.FR</text>
</svg>
