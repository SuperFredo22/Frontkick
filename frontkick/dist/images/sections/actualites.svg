<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0c0c"/>
      <stop offset="100%" stop-color="#1d1d1d"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Newspaper column lines -->
  <rect x="460" y="60"  width="280" height="3"  rx="1.5" fill="rgba(255,255,255,0.09)"/>
  <rect x="460" y="80"  width="260" height="3"  rx="1.5" fill="rgba(255,255,255,0.06)"/>
  <rect x="460" y="100" width="240" height="3"  rx="1.5" fill="rgba(255,255,255,0.06)"/>
  <rect x="460" y="120" width="280" height="3"  rx="1.5" fill="rgba(255,255,255,0.06)"/>
  <rect x="460" y="140" width="200" height="3"  rx="1.5" fill="rgba(255,255,255,0.06)"/>
  <rect x="460" y="175" width="280" height="3"  rx="1.5" fill="rgba(255,255,255,0.09)"/>
  <rect x="460" y="195" width="255" height="3"  rx="1.5" fill="rgba(255,255,255,0.06)"/>
  <rect x="460" y="215" width="270" height="3"  rx="1.5" fill="rgba(255,255,255,0.06)"/>
  <rect x="460" y="235" width="230" height="3"  rx="1.5" fill="rgba(255,255,255,0.06)"/>
  <!-- Breaking news bar -->
  <rect x="460" y="275" width="280" height="32" rx="4" fill="rgba(220,38,38,0.75)"/>
  <text x="474" y="297" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="white" letter-spacing="3">BREAKING NEWS</text>
  <!-- Divider line -->
  <rect x="0" y="0" width="4" height="450" fill="#DC2626"/>
  <!-- Section name -->
  <text x="62" y="185" font-family="'Arial Black',Impact,sans-serif" font-size="90" font-weight="900" fill="white" opacity="0.95">ACTU</text>
  <text x="62" y="275" font-family="'Arial Black',Impact,sans-serif" font-size="90" font-weight="900" fill="white" opacity="0.95">ALITÉS</text>
  <text x="66" y="308" font-family="Arial,sans-serif" font-size="16" fill="rgba(255,255,255,0.5)" letter-spacing="8">SPORTS DE COMBAT</text>
  <rect x="66" y="326" width="120" height="4" rx="2" fill="#DC2626"/>
  <text x="66" y="420" font-family="Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.22)" letter-spacing="5">FIGHTFOCUS.FR</text>
</svg>
