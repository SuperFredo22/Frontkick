<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060D1F"/>
      <stop offset="60%" stop-color="#0F2040"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <radialGradient id="vign" cx="30%" cy="50%" r="90%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.72)"/>
    </radialGradient>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" seed="5" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="multiply" result="b"/>
      <feComposite in="b" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Grain texture -->
  <rect width="800" height="450" fill="rgba(160,160,160,0.14)" filter="url(#grain)"/>

  <!-- Cage octagon - outermost -->
  <polygon points="600,18 730,80 730,370 600,432 470,370 470,80" fill="none" stroke="rgba(255,255,255,0.055)" stroke-width="50"/>
  <!-- Mid octagon -->
  <polygon points="600,90 692,140 692,310 600,360 508,310 508,140" fill="none" stroke="rgba(30,136,229,0.12)" stroke-width="28"/>
  <!-- Inner octagon accent -->
  <polygon points="600,150 648,175 648,275 600,300 552,275 552,175" fill="none" stroke="rgba(56,189,248,0.28)" stroke-width="2.5"/>
  <!-- Octagon center glow -->
  <circle cx="600" cy="225" r="45" fill="rgba(30,136,229,0.07)"/>

  <!-- Diagonal speed lines -->
  <line x1="0" y1="380" x2="380" y2="0" stroke="rgba(56,189,248,0.16)" stroke-width="1.5"/>
  <line x1="40" y1="450" x2="420" y2="0" stroke="rgba(30,136,229,0.10)" stroke-width="1"/>
  <line x1="0" y1="280" x2="280" y2="0" stroke="rgba(56,189,248,0.08)" stroke-width="1"/>

  <!-- Horizontal rule above text -->
  <rect x="62" y="148" width="60" height="2" fill="rgba(56,189,248,0.5)"/>

  <!-- Text shadow -->
  <text x="66" y="204" font-family="'Arial Black',Impact,sans-serif" font-size="122" font-weight="900" fill="rgba(0,0,0,0.45)" letter-spacing="-2">MMA</text>
  <!-- Main text -->
  <text x="62" y="200" font-family="'Arial Black',Impact,sans-serif" font-size="122" font-weight="900" fill="white" opacity="0.96" letter-spacing="-2">MMA</text>

  <!-- Subtitle -->
  <text x="66" y="248" font-family="Arial,sans-serif" font-size="18" fill="rgba(255,255,255,0.52)" letter-spacing="12">MIXED MARTIAL ARTS</text>
  <!-- Accent bar -->
  <rect x="66" y="266" width="56" height="3" rx="1.5" fill="#38BDF8"/>
  <rect x="128" y="266" width="160" height="3" rx="1.5" fill="rgba(255,255,255,0.12)"/>
  <!-- Tags -->
  <text x="66" y="308" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.35)" letter-spacing="5">CAGE · OCTOGONE · MONDIAL</text>
  <!-- Brand -->
  <text x="66" y="422" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.18)" letter-spacing="6">FIGHTFOCUS.FR</text>

  <!-- Vignette overlay -->
  <rect width="800" height="450" fill="url(#vign)"/>
</svg>
