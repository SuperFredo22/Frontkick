<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060415"/>
      <stop offset="55%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <radialGradient id="vign" cx="28%" cy="50%" r="90%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.74)"/>
    </radialGradient>
    <radialGradient id="glow" cx="72%" cy="50%" r="38%">
      <stop offset="0%" stop-color="rgba(124,58,237,0.38)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" seed="18" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="multiply" result="b"/>
      <feComposite in="b" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="rgba(160,160,160,0.13)" filter="url(#grain)"/>
  <rect width="800" height="450" fill="url(#glow)"/>

  <!-- Glow rings concentric -->
  <circle cx="680" cy="228" r="135" fill="none" stroke="rgba(124,58,237,0.18)" stroke-width="45"/>
  <circle cx="680" cy="228" r="85"  fill="none" stroke="rgba(109,40,217,0.14)" stroke-width="22"/>
  <circle cx="680" cy="228" r="42"  fill="rgba(124,58,237,0.10)"/>

  <!-- Lightning bolt - more detailed -->
  <polygon points="668,52 635,228 672,228 632,398 748,192 702,192 738,52"
    fill="rgba(139,92,246,0.32)" stroke="rgba(196,181,253,0.55)" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Inner bolt highlight -->
  <polygon points="668,80 648,200 675,200 645,360 720,220 692,220 712,80"
    fill="rgba(255,255,255,0.10)"/>

  <!-- Speed lines -->
  <line x1="448" y1="148" x2="600" y2="148" stroke="rgba(167,139,250,0.20)" stroke-width="3"/>
  <line x1="448" y1="178" x2="580" y2="178" stroke="rgba(167,139,250,0.15)" stroke-width="2.5"/>
  <line x1="448" y1="208" x2="564" y2="208" stroke="rgba(167,139,250,0.12)" stroke-width="2"/>
  <line x1="448" y1="268" x2="564" y2="268" stroke="rgba(167,139,250,0.12)" stroke-width="2"/>
  <line x1="448" y1="298" x2="580" y2="298" stroke="rgba(167,139,250,0.15)" stroke-width="2.5"/>
  <line x1="448" y1="328" x2="600" y2="328" stroke="rgba(167,139,250,0.20)" stroke-width="3"/>

  <line x1="0" y1="360" x2="340" y2="0" stroke="rgba(124,58,237,0.14)" stroke-width="1.5"/>

  <rect x="62" y="148" width="50" height="2" fill="rgba(167,139,250,0.65)"/>

  <!-- Text shadow -->
  <text x="66" y="240" font-family="'Arial Black',Impact,sans-serif" font-size="165" font-weight="900" fill="rgba(0,0,0,0.50)" letter-spacing="-4">K-1</text>
  <!-- Main text -->
  <text x="62" y="236" font-family="'Arial Black',Impact,sans-serif" font-size="165" font-weight="900" fill="white" opacity="0.97" letter-spacing="-4">K-1</text>

  <text x="66" y="280" font-family="Arial,sans-serif" font-size="17" fill="rgba(255,255,255,0.48)" letter-spacing="10">WORLD MAX · KICKBOXING</text>
  <rect x="66" y="298" width="55" height="3" rx="1.5" fill="#7C3AED"/>
  <rect x="127" y="298" width="100" height="3" rx="1.5" fill="rgba(255,255,255,0.12)"/>
  <text x="66" y="336" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.34)" letter-spacing="4">PUISSANCE · VITESSE · JAPON</text>
  <text x="66" y="422" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.18)" letter-spacing="6">FIGHTFOCUS.FR</text>

  <rect width="800" height="450" fill="url(#vign)"/>
</svg>
