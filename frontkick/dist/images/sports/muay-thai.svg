<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3D1A00"/>
      <stop offset="55%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <radialGradient id="vign" cx="28%" cy="50%" r="90%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.70)"/>
    </radialGradient>
    <radialGradient id="flameglow" cx="70%" cy="20%" r="35%">
      <stop offset="0%" stop-color="rgba(251,191,36,0.3)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" seed="12" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="multiply" result="b"/>
      <feComposite in="b" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="rgba(160,160,160,0.13)" filter="url(#grain)"/>

  <!-- Flame glow -->
  <rect width="800" height="450" fill="url(#flameglow)"/>

  <!-- Thai temple silhouette -->
  <polygon points="650,340 675,210 695,210 695,340" fill="rgba(0,0,0,0.18)"/>
  <polygon points="660,210 675,148 695,210"  fill="rgba(0,0,0,0.18)"/>
  <polygon points="575,340 606,248 623,248 623,340" fill="rgba(0,0,0,0.14)"/>
  <polygon points="583,248 606,194 623,248"  fill="rgba(0,0,0,0.14)"/>
  <polygon points="500,340 524,272 538,272 538,340" fill="rgba(0,0,0,0.10)"/>
  <polygon points="507,272 524,228 538,272"  fill="rgba(0,0,0,0.10)"/>
  <rect x="480" y="336" width="240" height="7" rx="3.5" fill="rgba(0,0,0,0.14)"/>

  <!-- Flame elements -->
  <ellipse cx="710" cy="75" rx="32" ry="55" fill="rgba(251,191,36,0.22)" transform="rotate(-12,710,75)"/>
  <ellipse cx="728" cy="82" rx="22" ry="40" fill="rgba(245,158,11,0.18)" transform="rotate(8,728,82)"/>
  <ellipse cx="748" cy="65" rx="16" ry="30" fill="rgba(217,119,6,0.15)" transform="rotate(-5,748,65)"/>
  <ellipse cx="695" cy="90" rx="14" ry="28" fill="rgba(251,191,36,0.16)" transform="rotate(5,695,90)"/>
  <ellipse cx="762" cy="78" rx="12" ry="24" fill="rgba(245,158,11,0.12)"/>

  <!-- Diagonal accent -->
  <line x1="0" y1="370" x2="350" y2="0" stroke="rgba(245,158,11,0.18)" stroke-width="1.5"/>
  <line x1="0" y1="280" x2="260" y2="0" stroke="rgba(245,158,11,0.10)" stroke-width="1"/>

  <!-- Horizontal rule -->
  <rect x="62" y="138" width="50" height="2" fill="rgba(251,191,36,0.55)"/>

  <!-- Text shadow -->
  <text x="66" y="198" font-family="'Arial Black',Impact,sans-serif" font-size="84" font-weight="900" fill="rgba(0,0,0,0.45)">MUAY</text>
  <text x="66" y="284" font-family="'Arial Black',Impact,sans-serif" font-size="84" font-weight="900" fill="rgba(0,0,0,0.45)">THAÏ</text>
  <!-- Main text -->
  <text x="62" y="194" font-family="'Arial Black',Impact,sans-serif" font-size="84" font-weight="900" fill="white" opacity="0.97">MUAY</text>
  <text x="62" y="280" font-family="'Arial Black',Impact,sans-serif" font-size="84" font-weight="900" fill="white" opacity="0.97">THAÏ</text>

  <text x="66" y="314" font-family="Arial,sans-serif" font-size="16" fill="rgba(255,255,255,0.50)" letter-spacing="10">ART DES 8 MEMBRES</text>
  <rect x="66" y="330" width="58" height="3" rx="1.5" fill="#F59E0B"/>
  <rect x="130" y="330" width="110" height="3" rx="1.5" fill="rgba(255,255,255,0.14)"/>
  <text x="66" y="368" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.35)" letter-spacing="4">GENOUX · COUDES · THAÏLANDE</text>
  <text x="66" y="422" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.18)" letter-spacing="6">FIGHTFOCUS.FR</text>

  <rect width="800" height="450" fill="url(#vign)"/>
</svg>
