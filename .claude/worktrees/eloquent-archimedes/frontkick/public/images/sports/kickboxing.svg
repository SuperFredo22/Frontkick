<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130">
  <g fill="white">
    <!-- Head -->
    <circle cx="36" cy="12" r="11"/>
    <!-- Torso (leaning back slightly for kick momentum) -->
    <polygon points="28,28 52,26 56,66 24,68"/>
    <!-- Standing leg (left) -->
    <polygon points="28,68 44,66 40,114 26,114"/>
    <!-- Standing foot -->
    <ellipse cx="32" cy="116" rx="14" ry="5"/>
    <!-- Kicking thigh (right leg, extending up-right) -->
    <polygon points="44,66 56,64 90,38 84,26"/>
    <!-- Kicking shin -->
    <polygon points="86,28 94,22 99,32 91,40"/>
    <!-- Kicking foot/boot -->
    <ellipse cx="96" cy="26" rx="9" ry="7"/>
    <!-- Left arm guard (front) -->
    <polygon points="30,38 8,26 6,34 22,44"/>
    <!-- Left fist -->
    <rect x="2" y="22" width="10" height="14" rx="4"/>
    <!-- Right arm (back, behind body) -->
    <polygon points="50,34 70,20 73,29 56,44"/>
    <!-- Right fist -->
    <rect x="67" y="16" width="10" height="13" rx="4"/>
  </g>
</svg>
