<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130">
  <g fill="white">
    <!-- Boxing glove (side view, dominant icon for equipment) -->
    <!-- Main glove body -->
    <ellipse cx="50" cy="58" rx="34" ry="38"/>
    <!-- Thumb -->
    <ellipse cx="24" cy="36" rx="11" ry="14" transform="rotate(-20 24 36)"/>
    <!-- Lace line (horizontal) -->
    <rect x="22" y="54" width="56" height="4" rx="2" fill="rgba(0,0,0,0.25)"/>
    <!-- Wrist cuff -->
    <rect x="28" y="90" width="44" height="22" rx="6"/>
    <!-- Velcro strap line -->
    <rect x="28" y="96" width="44" height="3" rx="1.5" fill="rgba(0,0,0,0.2)"/>
    <!-- Knuckle ridges -->
    <rect x="30" y="25" width="40" height="5" rx="2.5" fill="rgba(0,0,0,0.18)"/>
    <rect x="28" y="34" width="42" height="4" rx="2" fill="rgba(0,0,0,0.15)"/>
  </g>
</svg>
