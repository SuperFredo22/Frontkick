    <rect x="14" y="66" width="28" height="3" rx="1.5" fill="rgba(0,0,0,0.22)"/>
    <rect x="14" y="75" width="22" height="3" rx="1.5" fill="rgba(0,0,0,0.22)"/>
    <rect x="14" y="84" width="28" height="3" rx="1.5" fill="rgba(0,0,0,0.22)"/>

