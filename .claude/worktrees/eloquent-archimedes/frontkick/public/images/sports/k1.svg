<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130">
  <g fill="white">
    <!-- K-1 — flying knee (spectacular technique) -->
    <!-- Figure jumping, knee raised high -->
    <!-- Head -->
    <circle cx="50" cy="8" r="11"/>
    <!-- Torso (upright, jumping) -->
    <polygon points="42,22 62,22 64,56 38,58"/>
    <!-- Raised right knee (flying knee — both feet off ground) -->
    <!-- Right thigh driving up -->
    <polygon points="50,56 64,54 62,86 44,90"/>
    <!-- Right kneecap (striking weapon) -->
    <ellipse cx="52" cy="92" rx="14" ry="12"/>
    <!-- Left leg bent behind (in the air) -->
    <polygon points="42,58 54,56 50,90 36,88"/>
    <!-- Left foot curled back -->
    <ellipse cx="42" cy="92" rx="10" ry="7" transform="rotate(-20 42 92)"/>
    <!-- Both arms raised for balance / guard -->
    <polygon points="44,28 16,14 14,24 30,36"/>
    <rect x="8" y="10" width="10" height="14" rx="4"/>
    <polygon points="60,26 82,12 85,22 68,36"/>
    <rect x="82" y="8" width="10" height="14" rx="4"/>
    <!-- Motion lines (speed) -->
    <line x1="20" y1="80" x2="2" y2="84" stroke="white" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="20" y1="92" x2="0" y2="94" stroke="white" stroke-width="2" opacity="0.28" stroke-linecap="round"/>
    <line x1="22" y1="100" x2="4" y2="106" stroke="white" stroke-width="1.5" opacity="0.18" stroke-linecap="round"/>
  </g>
</svg>
