<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130">
  <g fill="white">
    <!-- Head (leaning forward) -->
    <circle cx="54" cy="11" r="11"/>
    <!-- Neck -->
    <polygon points="48,22 60,22 60,30 48,30"/>
    <!-- Torso leaning forward -->
    <polygon points="44,30 66,28 68,62 38,66"/>
    <!-- Raised knee (left leg, striking forward-up) -->
    <!-- Upper thigh -->
    <polygon points="40,66 58,62 54,92 34,96"/>
    <!-- Kneecap - the striking weapon -->
    <ellipse cx="44" cy="97" rx="13" ry="11"/>
    <!-- Standing right leg -->
    <polygon points="56,64 68,62 72,110 58,112"/>
    <!-- Right foot -->
    <ellipse cx="64" cy="114" rx="12" ry="5"/>
    <!-- Left arm (clinch - reaching forward left) -->
    <polygon points="46,36 6,52 6,62 18,62 46,48"/>
    <!-- Left hand (clinching opponent's neck) -->
    <ellipse cx="4" cy="57" rx="10" ry="8"/>
    <!-- Right arm (clinch - reaching forward right) -->
    <polygon points="64,34 90,46 90,56 78,58 64,46"/>
    <!-- Right hand -->
    <ellipse cx="92" cy="51" rx="9" ry="8"/>
  </g>
</svg>
