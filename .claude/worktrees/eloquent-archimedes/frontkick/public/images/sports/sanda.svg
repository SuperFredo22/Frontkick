<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130">
  <g fill="white">
    <!-- Sanda — spinning back kick -->
    <!-- Head (turned, looking back) -->
    <circle cx="55" cy="14" r="11"/>
    <!-- Torso (turned away, spinning) -->
    <polygon points="46,28 66,26 70,66 40,68"/>
    <!-- Kicking leg (left, extended back-right as spinning kick) -->
    <polygon points="64,66 76,60 96,44 90,32"/>
    <!-- Kicking foot -->
    <ellipse cx="94" cy="37" rx="9" ry="7"/>
    <!-- Standing leg (right) -->
    <polygon points="44,68 58,66 54,112 40,112"/>
    <ellipse cx="46" cy="114" rx="13" ry="5"/>
    <!-- Guard arms (during spin) -->
    <polygon points="48,36 20,26 18,34 32,44"/>
    <rect x="12" y="22" width="10" height="14" rx="4"/>
    <polygon points="64,34 84,24 87,32 70,44"/>
    <rect x="83" y="20" width="10" height="14" rx="4"/>
  </g>
</svg>
